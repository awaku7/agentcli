<!DOCTYPE html>
<html lang="{{ page_lang or 'en' }}" dir="{{ page_dir or 'ltr' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UAGENT WEB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-container { flex-grow: 1; min-height: 0; }
        pre { white-space: pre-wrap; word-wrap: break-word; }
        .role-user { background-color: #f3f4f6 !important; color: #111827 !important; align-self: flex-end; }
        .role-assistant { background-color: #dcf8c6 !important; color: #111827 !important; align-self: flex-start; }
        .role-system { display: none; } /* システムメッセージは非表示 */
        .role-tool { background-color: #fff9c4 !important; color: #111827 !important; font-size: 0.85rem; border-left: 4px solid #fbc02d; margin: 5px 0; }
        .status-busy { color: #f59e0b; font-weight: bold; }
        .status-idle { color: #10b981; font-weight: bold; }
        .blink { animation: blink 1s steps(2, start) infinite; }
        @keyframes blink { to { visibility: hidden; } }
    </style>
</head>
<body class="bg-gray-100 font-sans">
    <div class="w-full h-screen p-4 flex gap-4 overflow-hidden">
        <!-- Left Pane (Chat Area) -->
        <div id="chat-pane" class="flex-grow flex flex-col h-full max-w-5xl mx-auto">
        <!-- Header -->
        <div class="flex justify-between items-center mb-4 bg-white p-4 rounded shadow">
            <h1 id="app-title" class="text-xl font-bold text-gray-800">UAGENT WEB</h1>
            <div id="status-area">
                Status: <span id="status-text-header" class="status-idle">IDLE</span>
                <div id="busy-indicator" class="hidden text-xs font-mono text-red-600 blink">TOOL RUNNING</div>
                <div id="workdir-text-header" class="text-xs text-gray-500 font-mono"></div>
                <div id="modes-area" class="text-xs text-gray-500 font-mono flex items-center gap-2 mt-1">
                    <span id="modes-text"></span>
                    <span class="ml-2">R:</span>
                    <select id="reasoning-select" class="border rounded px-1 py-0.5 text-gray-800">
                        <option value="off">off</option>
                        <option value="auto">auto</option>
                        <option value="minimal">minimal</option>
                        <option value="low">low</option>
                        <option value="medium">medium</option>
                        <option value="high">high</option>
                        <option value="xhigh">xhigh</option>
                    </select>
                    <span>V:</span>
                    <select id="verbosity-select" class="border rounded px-1 py-0.5 text-gray-800">
                        <option value="off">off</option>
                        <option value="low">low</option>
                        <option value="medium">medium</option>
                        <option value="high">high</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Chat Area -->
        <div id="chat-box" class="chat-container overflow-y-auto bg-white p-4 rounded shadow mb-4 flex flex-col gap-4">
            <!-- Messages appear here -->
        </div>

        <!-- Human Ask Overlay -->
        <div id="human-ask-container" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
            <div class="bg-white p-6 rounded-lg shadow-xl max-w-lg w-full">
                <h2 id="human-ask-title" class="text-lg font-bold mb-2">確認が必要です</h2>
                <div id="human-ask-message" class="mb-4 text-gray-700 whitespace-pre-wrap"></div>
                <input type="text" id="human-ask-input" class="w-full p-2 border rounded mb-4 focus:ring-2 focus:ring-blue-500" placeholder="回答を入力...">
                <div class="flex justify-end gap-2">
                    <button id="human-ask-submit-btn" onclick="submitHumanAsk()" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">送信</button>
                </div>
            </div>
        </div>

        <!-- Footer Status Area -->
        <div class="bg-gray-800 text-white p-2 rounded shadow mb-4 flex justify-between items-center px-4 h-10">
            <span id="footer-status-label" class="text-sm font-mono">Current Status:</span>
            <span id="status-text-footer" class="text-sm font-bold status-idle">IDLE</span>
        </div>

        <!-- Attachment Area -->
        <div id="drop-zone" class="mb-3 rounded border-2 border-dashed border-gray-300 bg-gray-50 p-3">
            <div class="flex items-center justify-between gap-2 mb-2">
                <div class="text-sm text-gray-600">ここにファイル/画像をドラッグ＆ドロップ</div>
                <button id="pick-files-btn" type="button" class="text-sm bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded">ファイル選択</button>
            </div>
            <input id="file-input" type="file" multiple class="hidden">
            <div id="attachment-preview" class="flex flex-wrap gap-3"></div>
        </div>

        <!-- Input Area -->
        <div class="flex gap-2">
            <textarea id="user-input" rows="2" class="flex-grow p-2 border rounded shadow focus:ring-2 focus:ring-blue-500" placeholder="メッセージを入力... (Ctrl+Enterで送信)"></textarea>
            <button id="send-btn" class="bg-blue-600 text-white px-6 py-2 rounded shadow hover:bg-blue-700 font-bold">送信</button>
        </div>
        </div> <!-- End of Left Pane -->

        <!-- Right Pane (Preview Area / Artifacts) -->
        <div id="preview-panel" class="hidden w-[45%] bg-white rounded shadow flex flex-col h-full border border-gray-200 overflow-hidden">
            <!-- Preview Header -->
            <div class="flex justify-between items-center p-3 border-b bg-gray-50">
                <span class="font-bold text-gray-700 text-sm">Artifact Preview</span>
                <div class="flex gap-2">
                    <button onclick="togglePreviewMode('preview')" id="btn-mode-preview" class="px-2 py-1 text-xs bg-blue-600 text-white rounded font-bold">Preview</button>
                    <button onclick="togglePreviewMode('code')" id="btn-mode-code" class="px-2 py-1 text-xs bg-gray-200 text-gray-700 rounded hover:bg-gray-300">Code</button>
                    <button onclick="closePreviewPanel()" class="text-gray-500 hover:text-gray-700 text-xl font-bold px-2 leading-none">×</button>
                </div>
            </div>
            <!-- Preview Content -->
            <div class="flex-grow relative bg-gray-50">
                <!-- iframe (Preview) -->
                <iframe id="preview-iframe" sandbox="allow-scripts" class="w-full h-full border-none bg-white"></iframe>
                <!-- pre (Code) -->
                <pre id="preview-code" class="hidden w-full h-full p-4 overflow-auto bg-gray-900 text-gray-100 text-xs font-mono"></pre>
            </div>
        </div>
    </div> <!-- End of Split-View Container -->

    <script>
        {% raw %}
        let ws;
        let WEB_VERBOSE = false;
        let currentHumanAskIsPassword = false;

        // --- Generative UI (Artifacts) State & Functions ---
        let currentArtifactHtml = '';
        let currentPreviewMode = 'preview'; // 'preview' or 'code'

        function renderArtifact(html) {
            currentArtifactHtml = html;
            const panel = document.getElementById('preview-panel');
            const iframe = document.getElementById('preview-iframe');
            const codePre = document.getElementById('preview-code');
            const chatPane = document.getElementById('chat-pane');

            if (panel) panel.classList.remove('hidden');
            if (chatPane) chatPane.classList.remove('max-w-5xl', 'mx-auto');
            
            if (currentPreviewMode === 'preview') {
                if (iframe) {
                    // Inject Tailwind CSS CDN automatically if not present to ensure beautiful rendering
                    let finalHtml = html;
                    if (!html.includes('tailwindcss') && !html.includes('cdn.tailwindcss.com')) {
                        if (html.includes('</' + 'head>')) {
                            finalHtml = html.replace('</' + 'head>', '<' + 'script src="https://cdn.tailwindcss.com"></' + 'script></' + 'head>');
                        } else if (html.includes('<' + 'head>')) {
                            finalHtml = html.replace('<' + 'head>', '<' + 'head><' + 'script src="https://cdn.tailwindcss.com"></' + 'script>');
                        } else {
                            finalHtml = '<' + 'script src="https://cdn.tailwindcss.com"></' + 'script>' + html;
                        }
                    }
                    iframe.srcdoc = finalHtml;
                }
            } else {
                if (codePre) codePre.textContent = html;
            }
        }

        function togglePreviewMode(mode) {
            currentPreviewMode = mode;
            const btnPreview = document.getElementById('btn-mode-preview');
            const btnCode = document.getElementById('btn-mode-code');
            const iframe = document.getElementById('preview-iframe');
            const codePre = document.getElementById('preview-code');

            if (mode === 'preview') {
                if (btnPreview) {
                    btnPreview.className = 'px-2 py-1 text-xs bg-blue-600 text-white rounded font-bold';
                }
                if (btnCode) {
                    btnCode.className = 'px-2 py-1 text-xs bg-gray-200 text-gray-700 rounded hover:bg-gray-300';
                }
                if (iframe) iframe.classList.remove('hidden');
                if (codePre) codePre.classList.add('hidden');
                renderArtifact(currentArtifactHtml);
            } else {
                if (btnPreview) {
                    btnPreview.className = 'px-2 py-1 text-xs bg-gray-200 text-gray-700 rounded hover:bg-gray-300';
                }
                if (btnCode) {
                    btnCode.className = 'px-2 py-1 text-xs bg-blue-600 text-white rounded font-bold';
                }
                if (iframe) iframe.classList.add('hidden');
                if (codePre) codePre.classList.remove('hidden');
                if (codePre) codePre.textContent = currentArtifactHtml;
            }
        }

        function closePreviewPanel() {
            const panel = document.getElementById('preview-panel');
            if (panel) panel.classList.add('hidden');
            const chatPane = document.getElementById('chat-pane');
            if (chatPane) chatPane.classList.add('max-w-5xl', 'mx-auto');
        }

        function extractHtmlFromText(text) {
            if (!text) return '';
            // Match ```html ... ``` or ```xml ... ``` or standard <html>...</html>
            const codeBlockRegex = /```(?:html|xml|xhtml)?\s*([\s\S]*?)```/gi;
            let match;
            let lastHtml = '';
            while ((match = codeBlockRegex.exec(text)) !== null) {
                const code = match[1].trim();
                if (code.includes('<' + 'html') || code.includes('<!' + 'DOCTYPE') || code.includes('<' + 'div') || code.includes('<' + 'button') || code.includes('<' + 'script') || code.includes('<' + 'style')) {
                    lastHtml = code;
                }
            }
            if (!lastHtml) {
                // Fallback: check if the text itself contains <html>...</html>
                const htmlTagRegex = /<html[\s\S]*?<\/html>/gi;
                const tagMatch = htmlTagRegex.exec(text);
                if (tagMatch) {
                    lastHtml = tagMatch[0];
                }
            }
            return lastHtml;
        }

        // --- i18n (single HTML) ---
        const I18N = {
            ja: {
                title: 'UAGENT WEB',
                appTitle: 'UAGENT WEB',
                humanAskTitle: '確認が必要です',
                humanAskPlaceholder: '回答を入力...',
                humanAskSubmit: '送信',
                footerStatusLabel: '現在の状態:',
                inputPlaceholder: 'メッセージを入力... (Ctrl+Enterで送信)',
                send: '送信',
                statusPrefix: 'Status:',
                toolRunning: 'TOOL RUNNING',
                currentStatusPrefix: 'Current Status:'
            },
            en: {
                title: 'UAGENT WEB',
                appTitle: 'UAGENT WEB',
                humanAskTitle: 'Input required',
                humanAskPlaceholder: 'Type your reply...',
                humanAskSubmit: 'Send',
                footerStatusLabel: 'Current Status:',
                inputPlaceholder: 'Type a message... (Ctrl+Enter to send)',
                send: 'Send',
                statusPrefix: 'Status:',
                toolRunning: 'TOOL RUNNING',
                currentStatusPrefix: 'Current Status:'
            }
        };

        function detectLang() {
            // Priority: explicit URL param
            try {
                const url = new URL(window.location.href);
                const q = (url.searchParams.get('lang') || '').toLowerCase();
                if (q === 'ja' || q === 'en' || q === 'ar') return q;
            } catch (e) {
                // ignore
            }

            // Next: navigator.languages (more reliable than navigator.language in some setups)
            try {
                const langs = (navigator.languages && navigator.languages.length) ? navigator.languages : [];
                for (const l of langs) {
                    const s = String(l || '').toLowerCase();
                    if (s.startsWith('ja')) return 'ja';
                    if (s.startsWith('ar')) return 'ar';
                    if (s.startsWith('en')) return 'en';
                }
            } catch (e) {
                // ignore
            }

            // Next: navigator.language
            try {
                const nav = String(navigator.language || navigator.userLanguage || 'en').toLowerCase();
                if (nav.startsWith('ja')) return 'ja';
                if (nav.startsWith('ar')) return 'ar';
            } catch (e) {
                // ignore
            }

            return 'en';
        }

        function applyI18n(lang) {
            const t = I18N[lang] || I18N.en;
            try { document.documentElement.lang = lang; } catch (e) {}
            try { document.title = t.title; } catch (e) {}

            const appTitle = document.getElementById('app-title');
            if (appTitle) appTitle.textContent = t.appTitle;

            const humanAskTitle = document.getElementById('human-ask-title');
            if (humanAskTitle) humanAskTitle.textContent = t.humanAskTitle;

            const humanAskSubmitBtn = document.getElementById('human-ask-submit-btn');
            if (humanAskSubmitBtn) humanAskSubmitBtn.textContent = t.humanAskSubmit;

            const footerStatusLabel = document.getElementById('footer-status-label');
            if (footerStatusLabel) footerStatusLabel.textContent = t.footerStatusLabel;

            if (humanAskInput) humanAskInput.placeholder = t.humanAskPlaceholder;
            if (userInput) userInput.placeholder = t.inputPlaceholder;
            if (sendBtn) sendBtn.textContent = t.send;
        }

        const UI_LANG = detectLang();


        // Streaming assistant bubble state
        let streamAssistant = { id: null, div: null, pre: null, active: false, text: '' };
        let lastAssistantStreamText = '';

        const chatBox = document.getElementById('chat-box');
        const statusTextHeader = document.getElementById('status-text-header');
        const busyIndicator = document.getElementById('busy-indicator');
        const workdirTextHeader = document.getElementById('workdir-text-header');
        const statusTextFooter = document.getElementById('status-text-footer');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const pickFilesBtn = document.getElementById('pick-files-btn');
        const attachmentPreview = document.getElementById('attachment-preview');
        const humanAskContainer = document.getElementById('human-ask-container');
        const humanAskMessage = document.getElementById('human-ask-message');
        const humanAskInput = document.getElementById('human-ask-input');

        const modesText = document.getElementById('modes-text');
        const reasoningSelect = document.getElementById('reasoning-select');
        const verbositySelect = document.getElementById('verbosity-select');
        let CURRENT_MODES = { reasoning: 'off', verbosity: 'off' };
        let currentRoom = '';
        let pendingAttachments = [];

        function getRoomIdFromUrl() {
            try {
                const url = new URL(window.location.href);
                const pathRoom = (url.pathname.match(/^\/room\/([^\/]+)/) || [])[1];
                const queryRoom = url.searchParams.get('room');
                return pathRoom || queryRoom || '';
            } catch (e) {
                return '';
            }
        }

        function isImageAttachment(att) {
            const type = String((att && (att.type || att.mime)) || '').toLowerCase();
            const path = String((att && (att.saved_path || att.path || att.file_path || att.name)) || '').toLowerCase();
            return type.startsWith('image/')
                || ['image', 'image/png', 'image/jpeg', 'image/jpg', 'image/webp', 'image/gif'].includes(type)
                || /\.(png|jpe?g|gif|webp|bmp|svg)$/i.test(path);
        }

        function isAudioAttachment(att) {
            const type = String((att && (att.type || att.mime)) || '').toLowerCase();
            const path = String((att && (att.saved_path || att.path || att.file_path || att.name)) || '').toLowerCase();
            return type.startsWith('audio/')
                || ['audio', 'audio/mpeg', 'audio/mp3', 'audio/wav', 'audio/x-wav', 'audio/mp4', 'audio/aac', 'audio/flac', 'audio/ogg', 'audio/opus', 'audio/webm'].includes(type)
                || /\.(mp3|wav|m4a|aac|flac|ogg|opus|wma|mp4|webm)$/i.test(path);
        }

        function basenameFromPath(path) {
            return String(path || '').split(/[\\/]/).filter(Boolean).pop() || '';
        }

        function openAttachmentViewer(src, alt) {
            if (!src) return;
            let overlay = document.getElementById('attachment-viewer');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.id = 'attachment-viewer';
                overlay.className = 'hidden fixed inset-0 z-50 bg-black/80 flex items-center justify-center p-4';
                overlay.innerHTML = `
                    <div class="relative max-w-[95vw] max-h-[95vh]">
                        <button type="button" id="attachment-viewer-close" class="absolute -top-10 right-0 text-white text-3xl leading-none">×</button>
                        <img id="attachment-viewer-img" class="max-w-[95vw] max-h-[95vh] rounded shadow-lg bg-white" alt="">
                    </div>`;
                overlay.addEventListener('click', (e) => {
                    if (e.target === overlay) overlay.classList.add('hidden');
                });
                document.body.appendChild(overlay);
                overlay.querySelector('#attachment-viewer-close').onclick = () => overlay.classList.add('hidden');
            }
            const img = overlay.querySelector('#attachment-viewer-img');
            img.src = src;
            img.alt = alt || 'image';
            overlay.classList.remove('hidden');
        }

        function bindAttachmentClicks(root) {
            if (!root) return;
            root.querySelectorAll('img[data-attachment-src]').forEach((img) => {
                img.addEventListener('click', () => openAttachmentViewer(img.dataset.attachmentSrc, img.dataset.attachmentAlt || 'image'));
            });
        }

        function renderPendingAttachments() {
            if (!attachmentPreview) return;
            attachmentPreview.innerHTML = '';
            if (!pendingAttachments.length) {
                attachmentPreview.innerHTML = '<div class="text-xs text-gray-500">添付なし</div>';
                return;
            }

            pendingAttachments.forEach((att, idx) => {
                const isImage = isImageAttachment(att) && (att.data_url || att.url || att.saved_path || att.path);
                const isAudio = isAudioAttachment(att) && (att.url || att.saved_path || att.path);
                const wrapper = document.createElement('div');
                wrapper.className = isImage
                    ? 'relative inline-block max-w-[220px]'
                    : (isAudio
                        ? 'relative inline-flex flex-col gap-1 px-2 py-2 rounded bg-gray-50 border max-w-[260px]'
                        : 'relative inline-flex items-center px-2 py-1 rounded bg-gray-50 border max-w-[220px]');

                const remove = document.createElement('button');
                remove.type = 'button';
                remove.textContent = '×';
                remove.className = 'absolute right-1 top-1 w-6 h-6 rounded-full bg-gray-200 hover:bg-gray-300 text-xs z-10';
                remove.onclick = () => {
                    pendingAttachments.splice(idx, 1);
                    renderPendingAttachments();
                };
                wrapper.appendChild(remove);

                if (isImage) {
                    const img = document.createElement('img');
                    const src = att.data_url || att.url || (`/local-file?path=${encodeURIComponent(att.saved_path || att.path || '')}`);
                    img.className = 'max-w-[200px] max-h-[140px] rounded border cursor-pointer block';
                    img.src = src;
                    img.alt = att.name || basenameFromPath(att.saved_path || att.path || '') || 'image';
                    img.title = 'クリックで開く';
                    img.onclick = () => openAttachmentViewer(src, img.alt);
                    wrapper.appendChild(img);
                } else if (isAudio) {
                    const title = document.createElement('div');
                    title.className = 'text-xs text-gray-600 break-all';
                    title.textContent = att.name || basenameFromPath(att.saved_path || att.path || '') || 'audio';
                    wrapper.appendChild(title);
                    const audio = document.createElement('audio');
                    audio.controls = true;
                    audio.preload = 'none';
                    audio.className = 'w-[240px] max-w-full';
                    audio.src = att.url || (`/local-file?path=${encodeURIComponent(att.saved_path || att.path || '')}`);
                    wrapper.appendChild(audio);
                } else {
                    const title = document.createElement('div');
                    title.className = 'text-xs text-gray-600 break-all';
                    title.textContent = att.name || basenameFromPath(att.saved_path || att.path || '') || 'file';
                    wrapper.appendChild(title);
                }

                attachmentPreview.appendChild(wrapper);
            });
        }

        async function uploadFiles(fileList) {
            const files = Array.from(fileList || []);
            if (!files.length) return;
            const fd = new FormData();
            fd.append('room', currentRoom || getRoomIdFromUrl() || '');
            files.forEach((f) => fd.append('files', f, f.name));

            const resp = await fetch('/upload', { method: 'POST', body: fd });
            const data = await resp.json();
            if (!data || !data.ok) {
                throw new Error((data && data.error) || 'upload failed');
            }
            if (Array.isArray(data.files) && data.files.length) {
                pendingAttachments.push(...data.files);
                renderPendingAttachments();
            }
        }

        function clearPendingAttachments() {
            pendingAttachments = [];
            renderPendingAttachments();
        }

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const url = new URL(window.location.href);
            // room id: /room/<id> (preferred) or ?room=<id>
            const pathRoom = (url.pathname.match(/^\/room\/([^\/]+)/) || [])[1];
            const queryRoom = url.searchParams.get('room');
            const room = pathRoom || queryRoom;
            currentRoom = room || '';
            const lang = detectLang();
            const qs = room ? `?room=${encodeURIComponent(room)}&lang=${encodeURIComponent(lang)}` : '';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws${qs}`);

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                if (data.type === 'init') {
                    WEB_VERBOSE = !!data.web_verbose;
                    if (chatBox) chatBox.innerHTML = '';
                    streamAssistant = { id: null, div: null, pre: null, active: false, text: '' };
                    lastAssistantStreamText = '';
                    data.messages.forEach(addMessage);
                    updateStatus(data.status);
                    if (data.modes) updateModes(data.modes);
                } else if (data.type === 'modes') {
                    if (data.modes) updateModes(data.modes);
                } else if (data.type === 'message') {
                    addMessage(data.message);
                } else if (data.type === 'status') {
                    updateStatus(data.status);
                } else if (data.type === 'human_ask') {
                    showHumanAsk(data.message, data.is_password);
                } else if (data.type === 'log') {
                    // Server-side logs are noisy; render only when WEB_VERBOSE is on.
                    if (WEB_VERBOSE) {
                        const rawContent = data.content_html || data.content;
                        addMessage({ role: 'tool', content: rawContent, is_raw_html: !!data.content_html });
                    }
                } else if (data.type === 'assistant_stream_start') {
                    startAssistantStream(data.id);
                } else if (data.type === 'assistant_stream_delta') {
                    appendAssistantStream(data.id, data.delta);
                } else if (data.type === 'assistant_stream_end') {
                    endAssistantStream(data.id);
                }
            };

            ws.onclose = () => {
                console.log('WebSocket connection closed. Retrying...');
                setTimeout(connect, 2000);
            };
        }

        function renderMessageAttachments(message) {
            const items = [];
            const seen = new Map();
            const addItem = (candidate) => {
                if (!candidate || typeof candidate !== 'object') return;
                const att = candidate;
                const type = String(att.type || att.mime || 'file').toLowerCase();
                const path = att.saved_path || att.path || att.file_path || '';
                const sourceKey = String(att.data_url || att.url || path || att.name || '').trim();
                if (!sourceKey) return;

                const isImage = isImageAttachment(att);
                const isAudio = isAudioAttachment(att);
                const prevIndex = seen.get(sourceKey);
                if (prevIndex !== undefined) {
                    const prev = items[prevIndex];
                    if (isImage && prev && !prev.isImage) {
                        items[prevIndex] = { att, type, path, isImage, isAudio };
                    }
                    return;
                }

                seen.set(sourceKey, items.length);
                items.push({ att, type, path, isImage, isAudio });
            };

            const attachments = Array.isArray(message.attachments) ? message.attachments : [];
            const hasAttachmentImage = attachments.some((att) => isImageAttachment(att));

            attachments.forEach(addItem);
            if (!hasAttachmentImage && message.saved_path) addItem({ type: 'image', saved_path: message.saved_path });
            if (!hasAttachmentImage) (message.saved_files || []).forEach((p) => addItem({ type: 'file', saved_path: p }));

            if (!items.length) return '';

            let html = '<div class="mt-2 flex flex-wrap gap-2">';
            items.forEach(({ att, type, path, isImage, isAudio }) => {
                const title = att.name || basenameFromPath(path) || (isImage ? 'image' : (isAudio ? 'audio' : 'file'));
                const finalSrc = att.data_url || att.url || (path ? `/local-file?path=${encodeURIComponent(path)}` : '');
                if (isImage && finalSrc) {
                    html += '<div class="flex flex-col gap-1 max-w-[360px]">';
                    if (title) {
                        html += `<div class="text-xs text-gray-500 break-all">${escapeHtml(String(title))}</div>`;
                    }
                    html += `<img src="${escapeHtml(finalSrc)}" class="max-w-[360px] max-h-[280px] rounded cursor-pointer block" title="クリックで開く" data-attachment-src="${escapeHtml(finalSrc)}" data-attachment-alt="${escapeHtml(title)}"/>`;
                    html += '</div>';
                } else if (isAudio && finalSrc) {
                    html += '<div class="inline-flex flex-col gap-1 px-2 py-2 rounded bg-white border max-w-[280px]">';
                    if (title) {
                        html += `<div class="text-xs text-gray-600 break-all">${escapeHtml(String(title))}</div>`;
                    }
                    html += `<audio controls preload="none" class="w-[240px] max-w-full" src="${escapeHtml(finalSrc)}"></audio>`;
                    html += '</div>';
                } else {
                    html += '<div class="inline-flex items-center px-2 py-1 rounded bg-white border max-w-[220px]">';
                    html += `<div class="text-xs text-gray-600 break-all">${escapeHtml(String(title))}</div>`;
                    html += '</div>';
                }
            });
            html += '</div>';
            return html;
        }

        function normalizeMessageForDisplay(msg) {
            const src = (msg && typeof msg === 'object') ? Object.assign({}, msg) : { role: '', content: '' };
            const role = String(src.role || '').toLowerCase();
            const name = String(src.name || '').toLowerCase();
            const toolLabel = name || 'tool';
            let body = String(src.content || '');

            if (role !== 'tool') {
                return { msg: src, body };
            }

            const trimmed = body.trim();
            if (!trimmed) {
                return { msg: src, body: '' };
            }

            let parsed = null;
            if (trimmed.startsWith('{') || trimmed.startsWith('[')) {
                try {
                    parsed = JSON.parse(trimmed);
                } catch (e) {
                    parsed = null;
                }
            }

            if (parsed && typeof parsed === 'object') {
                if (parsed.saved_path) src.saved_path = parsed.saved_path;
                if (Array.isArray(parsed.saved_files)) src.saved_files = parsed.saved_files;
                if (!src.saved_files && Array.isArray(parsed.files)) src.saved_files = parsed.files;

                const paths = [];
                if (src.saved_path) paths.push(src.saved_path);
                if (Array.isArray(src.saved_files)) paths.push(...src.saved_files);

                if (paths.length) {
                    body = toolLabel === 'generate_image'
                        ? `${toolLabel}: done`
                        : `${toolLabel}: ${paths.map(basenameFromPath).filter(Boolean).join(', ')}`;
                } else if (typeof parsed.message === 'string' && parsed.message.trim()) {
                    body = `${toolLabel}: ${parsed.message.trim()}`;
                } else if (Array.isArray(parsed.results)) {
                    const q = typeof parsed.query === 'string' && parsed.query.trim() ? parsed.query.trim() : '';
                    const titles = parsed.results
                        .map(r => (r && typeof r.title === 'string' ? r.title.trim() : ''))
                        .filter(Boolean)
                        .slice(0, 3);
                    const count = parsed.results.length;
                    body = q
                        ? `${toolLabel}: ${q} → ${count}件${titles.length ? ` / ${titles.join(', ')}` : ''}`
                        : `${toolLabel}: ${count}件${titles.length ? ` / ${titles.join(', ')}` : ''}`;
                } else if (parsed.ok === true) {
                    body = `${toolLabel}: done`;
                } else {
                    body = `${toolLabel}: result`;
                }
            } else if (trimmed.includes('{') && trimmed.includes('}')) {
                // Tool output is JSON-like but could not be parsed cleanly.
                // Do not dump raw JSON into the chat; keep it compact.
                const savedPathMatch = trimmed.match(/"saved_path"\s*:\s*"([^"]+)"/i);
                if (savedPathMatch && savedPathMatch[1]) {
                    body = toolLabel === 'generate_image'
                        ? `${toolLabel}: done`
                        : `${toolLabel}: ${basenameFromPath(savedPathMatch[1])}`;
                } else {
                    body = `${toolLabel}: result`;
                }
            } else {
                // Plain text tool output: keep only a short summary.
                body = `${toolLabel}: ${trimmed.split(/\r?\n/, 1)[0].slice(0, 200)}`;
            }

            src.content = body;
            return { msg: src, body };
        }

        function addMessage(msg) {
            if (!msg) return;
            if (msg.is_raw_html) {
                const div = document.createElement('div');
                div.className = `p-3 rounded-lg max-w-[85%] ${getRoleClass(msg.role)}`;
                div.innerHTML = msg.content;
                chatBox.appendChild(div);
                chatBox.scrollTop = chatBox.scrollHeight;
                return;
            }
            const normalized = normalizeMessageForDisplay(msg);
            const msgForRender = normalized.msg;
            const body = normalized.body;

            let content = `<strong>${escapeHtml(String((msgForRender.role || 'message')).toUpperCase())}:</strong> `;
            if (msgForRender.name) content += `<span class="text-xs font-mono">[${escapeHtml(String(msgForRender.name))}]</span> `;

            if (body) {
                const isAssistant = String(msgForRender.role).toLowerCase() === 'assistant';
                const formattedBody = formatMessageBody(body, msgForRender.role);
                if (isAssistant) {
                    content += `<div class="mt-1 text-sm leading-relaxed whitespace-pre-wrap font-mono">${formattedBody}</div>`;
                } else {
                    content += `<pre class="mt-1 whitespace-pre-wrap font-mono">${formattedBody}</pre>`;
                }
                if (isAssistant) {
                    const extractedHtml = extractHtmlFromText(body);
                    if (extractedHtml) {
                        content += `<div class="mt-2"><button onclick="renderArtifact(decodeURIComponent('${encodeURIComponent(extractedHtml)}'))" class="bg-blue-500 hover:bg-blue-600 text-white text-xs font-bold px-3 py-1.5 rounded shadow-sm flex items-center gap-1">✨ Open in Preview</button></div>`;
                        // Automatically render the latest artifact
                        setTimeout(() => renderArtifact(extractedHtml), 100);
                    }
                }
            }

            if (WEB_VERBOSE && Array.isArray(msgForRender.tool_calls) && msgForRender.tool_calls.length) {
                msgForRender.tool_calls.forEach(tc => {
                    const toolName = tc && tc.function && tc.function.name ? tc.function.name : '';
                    content += `<div class="text-xs text-blue-600 font-mono mt-2 border-t pt-1">Tool Call: ${escapeHtml(String(toolName))}</div>`;
                });
            }

            const attachmentsHtml = renderMessageAttachments(msgForRender);
            if (attachmentsHtml) {
                content += attachmentsHtml;
            }

            const isAssistantFinal = String(msgForRender.role || '').toLowerCase() === 'assistant';
            const streamedText = String(lastAssistantStreamText || '').trim();
            const bodyText = String(body || '').trim();
            const streamDiv = streamAssistant.div && streamAssistant.div.dataset && streamAssistant.div.dataset.streamAssistant === '1'
                ? streamAssistant.div
                : null;
            if (isAssistantFinal && streamDiv && streamedText && bodyText && streamedText === bodyText) {
                streamDiv.innerHTML = content;
                streamDiv.className = `p-3 rounded-lg max-w-[85%] ${getRoleClass(msgForRender.role)}`;
                bindAttachmentClicks(streamDiv);
                try {
                    streamDiv.dataset.role = (msgForRender && msgForRender.role) ? String(msgForRender.role) : '';
                    streamDiv.dataset.content = (msgForRender && (msgForRender.content !== undefined)) ? String(msgForRender.content) : '';
                    streamDiv.dataset.ts = String((msgForRender && msgForRender._ts) ? msgForRender._ts : Date.now());
                    streamDiv.dataset.optimistic = (msgForRender && msgForRender._optimistic) ? '1' : '0';
                    streamDiv.dataset.streamAssistant = '0';
                } catch (e) {
                    // ignore
                }
                lastAssistantStreamText = '';
                streamAssistant.div = null;
                streamAssistant.pre = null;
                chatBox.scrollTop = chatBox.scrollHeight;
                return;
            }

            const div = document.createElement('div');
            div.className = `p-3 rounded-lg max-w-[85%] ${getRoleClass(msgForRender.role)}`;
            div.innerHTML = content;
            bindAttachmentClicks(div);

            try {
                div.dataset.role = (msgForRender && msgForRender.role) ? String(msgForRender.role) : '';
                div.dataset.content = (msgForRender && (msgForRender.content !== undefined)) ? String(msgForRender.content) : '';
                div.dataset.ts = String((msgForRender && msgForRender._ts) ? msgForRender._ts : Date.now());
                div.dataset.optimistic = (msgForRender && msgForRender._optimistic) ? '1' : '0';
            } catch (e) {
                // ignore
            }
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function startAssistantStream(id) {
            if (streamAssistant.active && streamAssistant.div) {
                return;
            }

            const div = document.createElement('div');
            div.className = `p-3 rounded-lg max-w-[85%] ${getRoleClass('assistant')}`;

            const pre = document.createElement('pre');
            pre.className = 'mt-1';
            pre.textContent = '';

            div.innerHTML = '<strong>ASSISTANT:</strong> ';
            div.appendChild(pre);
            div.dataset.streamAssistant = '1';

            streamAssistant.id = id;
            streamAssistant.div = div;
            streamAssistant.pre = pre;
            streamAssistant.text = '';
            streamAssistant.active = true;

            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function appendAssistantStream(id, delta) {
            if (!streamAssistant.active || streamAssistant.id !== id || !streamAssistant.pre) return;
            const s = String(delta || '');
            streamAssistant.text = String(streamAssistant.text || '') + s;
            
            // Use formatMessageBody to support real-time folding of code blocks
            const formatted = formatMessageBody(streamAssistant.text, 'assistant');
            
            // If it contains details/summary (folded code block), we render it as HTML, otherwise as pre
            if (formatted.includes('<details')) {
                // Replace the pre element with a div to allow HTML rendering of details
                if (streamAssistant.pre.tagName === 'PRE') {
                    const newDiv = document.createElement('div');
                    newDiv.className = 'mt-1 text-sm leading-relaxed';
                    streamAssistant.div.replaceChild(newDiv, streamAssistant.pre);
                    streamAssistant.pre = newDiv;
                }
                streamAssistant.pre.innerHTML = formatted;
            } else {
                streamAssistant.pre.innerHTML = formatted;
            }
            
            chatBox.scrollTop = chatBox.scrollHeight;

            // Real-time preview update during streaming
            const extractedHtml = extractHtmlFromText(streamAssistant.text);
            if (extractedHtml) {
                renderArtifact(extractedHtml);
            }
        }

        function endAssistantStream(id) {
            if (!streamAssistant.active || streamAssistant.id !== id) return;
            lastAssistantStreamText = String(streamAssistant.text || '');
            
            // Finalize the stream content with full formatting
            if (streamAssistant.div && streamAssistant.pre) {
                const formatted = formatMessageBody(streamAssistant.text, 'assistant');
                const extractedHtml = extractHtmlFromText(streamAssistant.text);
                
                let content = `<strong>ASSISTANT:</strong> `;
                if (formatted.includes('<details')) {
                    content += `<div class="mt-1 text-sm leading-relaxed whitespace-pre-wrap font-mono">${formatted}</div>`;
                } else {
                    content += `<pre class="mt-1 whitespace-pre-wrap font-mono">${formatted}</pre>`;
                }
                
                if (extractedHtml) {
                    content += `<div class="mt-2"><button onclick="renderArtifact(decodeURIComponent('${encodeURIComponent(extractedHtml)}'))" class="bg-blue-500 hover:bg-blue-600 text-white text-xs font-bold px-3 py-1.5 rounded shadow-sm flex items-center gap-1">✨ Open in Preview</button></div>`;
                }
                
                streamAssistant.div.innerHTML = content;
            }
            
            streamAssistant.active = false;
            streamAssistant.id = null;
            streamAssistant.text = '';
        }

        function getRoleClass(role) {
            switch(String(role || '').toLowerCase()) {
                case 'user': return 'role-user shadow-sm';
                case 'assistant': return 'role-assistant shadow-sm';
                case 'tool': return 'role-tool';
                case 'system': return 'role-system';
                default: return '';
            }
        }

        function modeToSelectValue(mode) {
            const m = String(mode || '').toLowerCase();
            if (['off','auto','minimal','low','medium','high','xhigh'].includes(m)) return m;
            if (m === '0' || m === 'none' || m === '') return 'off';
            if (m === '1') return 'low';
            if (m === '2') return 'medium';
            if (m === '3') return 'high';
            return 'off';
        }

        function selectValueToLabel(v) {
            const m = String(v || '').toLowerCase();
            if (['off','auto','minimal','low','medium','high','xhigh'].includes(m)) return m;
            if (m === '0') return 'off';
            if (m === '1') return 'low';
            if (m === '2') return 'medium';
            if (m === '3') return 'high';
            return 'off';
        }

        function updateModes(modes) {
            try {
                const r = (modes && modes.reasoning !== undefined) ? String(modes.reasoning) : 'off';
                const v = (modes && modes.verbosity !== undefined) ? String(modes.verbosity) : 'off';
                CURRENT_MODES = { reasoning: r, verbosity: v };

                if (modesText) modesText.textContent = `reasoning=${r} verbosity=${v}`;

                if (reasoningSelect) reasoningSelect.value = modeToSelectValue(r);
                if (verbositySelect) verbositySelect.value = modeToSelectValue(v);
            } catch (e) {
                // ignore
            }
        }

        function sendSetModes() {
            try {
                if (!ws || ws.readyState !== WebSocket.OPEN) return;
                const r = reasoningSelect ? reasoningSelect.value : null;
                const v = verbositySelect ? verbositySelect.value : null;
                ws.send(JSON.stringify({ type: 'set_modes', reasoning: r, verbosity: v }));
            } catch (e) {
                // ignore
            }
        }

        function updateStatus(status) {
            const label = status.label;
            const isBusy = status.busy;

            statusTextHeader.textContent = label;
            statusTextHeader.className = isBusy ? 'status-busy' : 'status-idle';
            
            statusTextFooter.textContent = label;
            statusTextFooter.className = isBusy ? 'status-busy' : 'status-idle';

            if (isBusy) {
                busyIndicator.classList.remove('hidden');
            } else {
                busyIndicator.classList.add('hidden');
            }

            const w = status.workdir || '';
            workdirTextHeader.textContent = w ? `workdir: ${w}` : '';

            userInput.disabled = false;
            sendBtn.disabled = false;
        }

        function sendMessage() {
            const text = userInput.value.trim();
            if ((!text && !pendingAttachments.length) || sendBtn.disabled) return;

            ws.send(JSON.stringify({ type: 'user_input', text: text, attachments: pendingAttachments }));
            userInput.value = '';
            clearPendingAttachments();
        }

        function showHumanAsk(message, isPassword) {
            humanAskMessage.textContent = message;
            currentHumanAskIsPassword = !!isPassword;
            humanAskInput.type = isPassword ? 'password' : 'text';
            humanAskInput.value = '';
            humanAskContainer.classList.remove('hidden');
            humanAskInput.focus();
        }

        function submitHumanAsk() {
            const text = humanAskInput.value;
            ws.send(JSON.stringify({ type: 'human_ask_response', text: text, is_password: currentHumanAskIsPassword }));
            humanAskContainer.classList.add('hidden');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        function ansiToHtml(text) {
            if (!text) return '';
            const ansiRegex = /\x1b\[([0-9;]*)m/g;
            let match;
            let lastIndex = 0;
            let result = '';
            let openSpans = 0;

            while ((match = ansiRegex.exec(text)) !== null) {
                result += escapeHtml(text.slice(lastIndex, match.index));
                const codes = match[1].split(';');
                
                if (codes.includes('0') || match[1] === '') {
                    while (openSpans > 0) {
                        result += '</span>';
                        openSpans--;
                    }
                } else {
                    let styles = [];
                    codes.forEach(code => {
                        if (code === '90') {
                            styles.push('color: #8e9196');
                        } else if (code === '31') {
                            styles.push('color: #ef4444');
                        } else if (code === '32') {
                            styles.push('color: #10b981');
                        } else if (code === '33') {
                            styles.push('color: #f59e0b');
                        } else if (code === '34') {
                            styles.push('color: #3b82f6');
                        } else if (code === '35') {
                            styles.push('color: #8b5cf6');
                        } else if (code === '36') {
                            styles.push('color: #06b6d4');
                        } else if (code === '1') {
                            styles.push('font-weight: bold');
                        } else if (code === '3') {
                            styles.push('font-style: italic');
                        } else if (code === '4') {
                            styles.push('text-decoration: underline');
                        }
                    });
                    if (styles.length > 0) {
                        result += `<span style="${styles.join('; ')}">`;
                        openSpans++;
                    }
                }
                lastIndex = ansiRegex.lastIndex;
            }
            result += escapeHtml(text.slice(lastIndex));
            while (openSpans > 0) {
                result += '</span>';
                openSpans--;
            }
            return result;
        }

        function formatMessageBody(body, role) {
            if (!body) return '';
            
            const isAssistant = String(role).toLowerCase() === 'assistant';
            if (!isAssistant || !body.includes('```')) {
                return linkifyHtml(ansiToHtml(body));
            }

            // Split the body by markdown code blocks to process them safely
            const parts = body.split(/(```(?:html|xml|xhtml|css|javascript|js|json|python|py|sh|bash)?[\s\S]*?```)/gi);
            let result = '';

            for (let part of parts) {
                if (part.startsWith('```') && part.endsWith('```')) {
                    const match = part.match(/```(?:html|xml|xhtml|css|javascript|js|json|python|py|sh|bash)?\s*([\s\S]*?)```/i);
                    if (match) {
                        const code = match[1];
                        const langMatch = part.match(/```(\w+)/);
                        const lang = langMatch ? langMatch[1] : 'code';
                        
                        // Escape the code content inside the details block so it doesn't render as HTML
                        const escapedCode = escapeHtml(code.trim());
                        
                        result += `<details class="my-2 border border-gray-300 rounded bg-gray-50 overflow-hidden">
                            <summary class="bg-gray-200 px-3 py-1.5 text-xs font-bold text-gray-700 cursor-pointer hover:bg-gray-300 select-none flex justify-between items-center">
                                <span>📄 Source Code (${lang.toUpperCase()})</span>
                                <span class="text-[10px] text-gray-500">クリックで展開</span>
                            </summary>
                            <pre class="p-3 text-xs font-mono overflow-auto max-h-[250px] bg-gray-900 text-gray-100 whitespace-pre">${escapedCode}</pre>
                        </details>`;
                    } else {
                        result += linkifyHtml(ansiToHtml(part));
                    }
                } else {
                    result += linkifyHtml(ansiToHtml(part));
                }
            }

            return result;
        }
        function linkifyHtml(escapedHtml) {
            // escapedHtml is already HTML-escaped; safe to inject as innerHTML
            const urlRe = /\b(https?:\/\/[^\s<>\"']+|www\.[^\s<>\"']+)/gi;
            return escapedHtml.replace(urlRe, (m) => {
                const href = m.startsWith('www.') ? ('https://' + m) : m;
                return `<a href="${href}" target="_blank" rel="noopener noreferrer" class="text-blue-600 underline break-all">${m}</a>`;
            });
        }


        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.onclick = sendMessage;

        if (pickFilesBtn && fileInput) {
            pickFilesBtn.onclick = () => fileInput.click();
        }
        if (fileInput) {
            fileInput.addEventListener('change', async () => {
                try {
                    await uploadFiles(fileInput.files);
                } catch (e) {
                    alert('Upload failed: ' + e);
                } finally {
                    fileInput.value = '';
                }
            });
        }
        if (dropZone) {
            const prevent = (e) => { e.preventDefault(); e.stopPropagation(); };
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach((evt) => {
                dropZone.addEventListener(evt, prevent, false);
            });
            ['dragenter', 'dragover'].forEach((evt) => {
                dropZone.addEventListener(evt, () => {
                    dropZone.classList.add('border-blue-500', 'bg-blue-50');
                }, false);
            });
            ['dragleave', 'drop'].forEach((evt) => {
                dropZone.addEventListener(evt, () => {
                    dropZone.classList.remove('border-blue-500', 'bg-blue-50');
                }, false);
            });
            dropZone.addEventListener('drop', async (e) => {
                try {
                    const files = e.dataTransfer && e.dataTransfer.files ? e.dataTransfer.files : [];
                    if (files.length) {
                        await uploadFiles(files);
                    }
                } catch (err) {
                    alert('Upload failed: ' + err);
                }
            }, false);
        }

        try {
            if (reasoningSelect) reasoningSelect.onchange = sendSetModes;
            if (verbositySelect) verbositySelect.onchange = sendSetModes;
        } catch (e) {
            // ignore
        }
        
        humanAskInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                submitHumanAsk();
            }
        });

        applyI18n(UI_LANG);
        connect();
        {% endraw %}
    </script>
</body>
</html>
