<!DOCTYPE html>
<html lang="{{ page_lang or 'en' }}" dir="{{ page_dir or 'ltr' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UAGENT WEB</title>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* === Theme Variables === */
        :root {
            --bg-primary: #f1f5f9;
            --bg-surface: #ffffff;
            --bg-surface-alt: #f8fafc;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border-color: #e2e8f0;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --user-bubble: #e0e7ff;
            --user-text: #1e1b4b;
            --assistant-bubble: #dbeafe;
            --assistant-text: #1e3a5f;
            --tool-bg: #fef3c7;
            --tool-border: #f59e0b;
            --status-idle: #10b981;
            --status-busy: #f59e0b;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
            --transition: 200ms ease;
        }
        .dark {
            --bg-primary: #0f172a;
            --bg-surface: #1e293b;
            --bg-surface-alt: #1a2332;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: #334155;
            --accent: #60a5fa;
            --accent-hover: #3b82f6;
            --user-bubble: #312e81;
            --user-text: #e0e7ff;
            --assistant-bubble: #1e3a5f;
            --assistant-text: #dbeafe;
            --tool-bg: #422006;
            --tool-border: #f59e0b;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.3);
        }

        /* === Base === */
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background var(--transition), color var(--transition);
        }

        /* === Chat Container === */
        .chat-container { flex-grow: 1; min-height: 0; }
        pre { white-space: pre-wrap; word-wrap: break-word; }
        .role-user {
            background: var(--user-bubble) !important;
            color: var(--user-text) !important;
            align-self: flex-end;
            border-bottom-right-radius: 4px !important;
            animation: msgIn 0.25s ease-out;
        }
        .role-assistant {
            background: var(--assistant-bubble) !important;
            color: var(--assistant-text) !important;
            align-self: flex-start;
            border-bottom-left-radius: 4px !important;
            animation: msgIn 0.25s ease-out;
        }
        .role-system { display: none; }
        .role-tool {
            background: var(--tool-bg) !important;
            color: var(--text-primary) !important;
            font-size: 0.85rem;
            border-left: 4px solid var(--tool-border);
            margin: 5px 0;
            animation: msgIn 0.2s ease-out;
        }
        .status-busy { color: var(--status-busy); font-weight: bold; }
        .status-idle { color: var(--status-idle); font-weight: bold; }
        .blink { animation: blink 1s steps(2, start) infinite; }
        @keyframes blink { to { visibility: hidden; } }
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to   { opacity: 1; transform: scale(1); }
        }

        /* === Settings Panel === */
        #settings-panel {
            transition: max-height 0.3s ease, opacity 0.25s ease, transform 0.25s ease;
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transform: translateY(-8px);
        }
        #settings-panel.open {
            max-height: 400px;
            opacity: 1;
            transform: translateY(0);
        }

        /* === Surface Elements === */
        .surface-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            transition: background var(--transition), border-color var(--transition), box-shadow var(--transition);
        }
        .surface-card:hover {
            box-shadow: var(--shadow-md);
        }

        /* === Scrollbar === */
        #chat-box::-webkit-scrollbar { width: 6px; }
        #chat-box::-webkit-scrollbar-track { background: transparent; }
        #chat-box::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 3px; }
        #chat-box::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

        /* === Dark Toggle Button === */
        .theme-toggle-btn {
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 1.1rem;
        }
        .theme-toggle-btn:hover {
            background: var(--border-color);
            transform: rotate(15deg);
        }

        /* === Settings Toggle Button === */
        .settings-toggle-btn {
            cursor: pointer;
            transition: transform 0.3s, color 0.2s;
            color: var(--text-secondary);
        }
        .settings-toggle-btn:hover { color: var(--accent); }
        .settings-toggle-btn.active { transform: rotate(90deg); color: var(--accent); }

        /* === Genre Checkboxes === */
        .genre-toggle { accent-color: var(--accent); }

        /* === Drop Zone === */
        #drop-zone {
            transition: border-color 0.2s, background 0.2s;
            background: var(--bg-surface-alt);
            border-color: var(--border-color);
        }


        /* === Human Ask Overlay === */
        #human-ask-container {
            animation: fadeIn 0.2s ease-out;
        }

        /* === Footer === */
        .footer-bar {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        /* === Preview Panel === */
        #preview-panel {
            background: var(--bg-surface);
            border-color: var(--border-color);
        }

        /* === Input === */
        #user-input, select, button {
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s, color 0.2s;
        }
        #user-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 20%, transparent);
        }
        select {
            background: var(--bg-surface);
            color: var(--text-primary);
            border-color: var(--border-color);
        }
        select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 20%, transparent);
        }

        /* === Code block in chat === */
        .code-block summary {
            transition: background 0.2s;
        }
        .code-block summary:hover {
            background: var(--border-color) !important;
        }
    </style>
</head>
<body class="font-sans">
    <div class="w-full h-screen p-4 flex gap-4 overflow-hidden">
        <!-- Left Pane (Chat Area) -->
        <div id="chat-pane" class="flex-grow flex flex-col h-full max-w-5xl mx-auto">

        <!-- === Header === -->
        <div class="surface-card rounded-xl px-5 py-3 mb-4 flex items-center justify-between gap-3">
            <div class="flex items-center gap-3">
                <h1 id="app-title" class="text-lg font-bold tracking-tight">UAGENT WEB</h1>
                <span id="modes-text" class="text-xs font-mono text-gray-500 dark:text-gray-400 hidden sm:inline"></span>
            </div>
            <div class="flex items-center gap-2">
                <span class="text-xs text-gray-500 dark:text-gray-400 font-mono hidden sm:block">
                    <span id="workdir-text-header"></span>
                </span>
                <span class="text-xs font-medium">
                    <span id="status-text-header" class="status-idle">IDLE</span>
                </span>
                <div id="busy-indicator" class="hidden text-[10px] font-mono text-red-500 blink bg-red-50 dark:bg-red-900/30 px-2 py-0.5 rounded-full">TOOL RUNNING</div>
                <!-- Settings Toggle -->
                <button id="settings-toggle-btn" onclick="toggleSettingsPanel()" class="settings-toggle-btn text-lg leading-none px-1" title="Settings">⚙</button>
                <!-- Dark Mode Toggle -->
                <button onclick="toggleDarkMode()" id="dark-mode-btn" class="theme-toggle-btn" title="Toggle dark mode">🌙</button>
            </div>
        </div>

        <!-- === Settings Panel (collapsible) === -->
        <div id="settings-panel" class="surface-card rounded-xl px-5 py-0 mb-3">
            <div class="py-4 flex flex-wrap items-center gap-x-4 gap-y-3 text-xs">
                <div class="flex items-center gap-2">
                    <span class="font-medium text-gray-500 dark:text-gray-400">Reasoning:</span>
                    <select id="reasoning-select" class="border rounded-md px-2 py-1 text-xs">
                        <option value="off">off</option>
                        <option value="auto">auto</option>
                        <option value="minimal">minimal</option>
                        <option value="low">low</option>
                        <option value="medium">medium</option>
                        <option value="high">high</option>
                        <option value="xhigh">xhigh</option>
                    </select>
                </div>
                <div class="flex items-center gap-2">
                    <span class="font-medium text-gray-500 dark:text-gray-400">Verbosity:</span>
                    <select id="verbosity-select" class="border rounded-md px-2 py-1 text-xs">
                        <option value="off">off</option>
                        <option value="low">low</option>
                        <option value="medium">medium</option>
                        <option value="high">high</option>
                    </select>
                </div>
                <div class="flex items-center gap-2 flex-wrap">
                    <span class="font-medium text-gray-500 dark:text-gray-400">Tools:</span>
                    <span id="genre-checkboxes" class="flex items-center gap-2">
                        <label class="flex items-center gap-0.5 cursor-pointer hover:opacity-80"><input type="checkbox" data-genre="comm" class="genre-toggle"> comm</label>
                        <label class="flex items-center gap-0.5 cursor-pointer hover:opacity-80"><input type="checkbox" data-genre="office" class="genre-toggle"> office</label>
                        <label class="flex items-center gap-0.5 cursor-pointer hover:opacity-80"><input type="checkbox" data-genre="devel" class="genre-toggle"> devel</label>
                        <label class="flex items-center gap-0.5 cursor-pointer hover:opacity-80"><input type="checkbox" data-genre="iot" class="genre-toggle"> iot</label>
                        <label class="flex items-center gap-0.5 cursor-pointer hover:opacity-80"><input type="checkbox" data-genre="basic" class="genre-toggle"> basic</label>
                        <label class="flex items-center gap-0.5 cursor-pointer hover:opacity-80"><input type="checkbox" data-genre="exec" class="genre-toggle"> exec</label>
                        <label class="flex items-center gap-0.5 cursor-pointer hover:opacity-80"><input type="checkbox" data-genre="external" class="genre-toggle"> external</label>
                        <label class="flex items-center gap-0.5 cursor-pointer hover:opacity-80"><input type="checkbox" data-genre="media" class="genre-toggle"> media</label>
                    </span>
                </div>
            </div>
        </div>

        <!-- === Chat Area === -->
        <div id="chat-box" class="chat-container overflow-y-auto surface-card rounded-xl p-4 mb-3 flex flex-col gap-3">
            <!-- Messages appear here -->
        </div>

        <!-- === Human Ask Overlay === -->
        <div id="human-ask-container" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 backdrop-blur-sm">
            <div class="surface-card rounded-xl shadow-xl max-w-lg w-full mx-4 p-6 border">
                <h2 id="human-ask-title" class="text-lg font-bold mb-2">確認が必要です</h2>
                <div id="human-ask-message" class="mb-4 text-sm whitespace-pre-wrap"></div>
                <input type="text" id="human-ask-input" class="w-full p-2.5 border rounded-lg mb-4 focus:outline-none" placeholder="回答を入力..." style="border-color: var(--border-color); background: var(--bg-surface); color: var(--text-primary);">
                <div class="flex justify-end gap-2">
                    <button id="human-ask-submit-btn" onclick="submitHumanAsk()" class="px-5 py-2 rounded-lg text-sm font-medium text-white transition" style="background: var(--accent);">送信</button>
                </div>
            </div>
        </div>

        <!-- === Footer Status Area === -->
        <div class="footer-bar rounded-xl px-4 py-2 mb-3 flex justify-between items-center text-sm">
            <span id="footer-status-label" class="font-mono text-xs">Current Status:</span>
            <span id="status-text-footer" class="text-xs font-bold status-idle">IDLE</span>
        </div>

        <!-- === Attachment Area === -->
        <div id="drop-zone" class="mb-3 rounded-xl border-2 border-dashed p-3 surface-card" style="background: var(--bg-surface-alt); border-color: var(--border-color);">
            <div class="flex items-center justify-between gap-2 mb-2">
                <div class="text-sm text-gray-500 dark:text-gray-400">Drop files/images here</div>
                <button id="pick-files-btn" type="button" class="text-sm px-3 py-1 rounded-lg transition" style="background: var(--border-color); color: var(--text-secondary);">Choose files</button>
            </div>
            <input id="file-input" type="file" multiple class="hidden">
            <div id="attachment-preview" class="flex flex-wrap gap-3"></div>
        </div>

        <!-- === Input Area === -->
        <div class="flex gap-2">
            <textarea id="user-input" rows="2" class="flex-grow p-3 border rounded-xl shadow-sm resize-none focus:outline-none" placeholder="Type a message... (Ctrl+Enter to send)" style="background: var(--bg-surface); color: var(--text-primary); border-color: var(--border-color);"></textarea>
            <button id="stop-btn" class="px-5 py-2 rounded-xl font-bold text-white shadow-sm transition hover:brightness-110 active:scale-[0.97] hidden" style="background: #ef4444;" title="Stop generation">&#9632; Stop</button>
            <button id="send-btn" class="px-6 py-2 rounded-xl font-bold text-white shadow-sm transition hover:brightness-110 active:scale-[0.97]" style="background: var(--accent);">Send</button>
        </div>
        </div> <!-- End of Left Pane -->

        <!-- === Right Pane (Preview Area / Artifacts) === -->
        <div id="preview-panel" class="hidden w-[45%] surface-card rounded-xl flex flex-col h-full border overflow-hidden">
            <div class="flex justify-between items-center px-4 py-3 border-b" style="background: var(--bg-surface-alt); border-color: var(--border-color);">
                <span class="font-bold text-sm">Artifact Preview</span>
                <div class="flex gap-2">
                    <button onclick="togglePreviewMode('preview')" id="btn-mode-preview" class="px-3 py-1.5 text-xs rounded-lg font-bold text-white transition" style="background: var(--accent);">Preview</button>
                    <button onclick="togglePreviewMode('code')" id="btn-mode-code" class="px-3 py-1.5 text-xs rounded-lg transition" style="background: var(--border-color); color: var(--text-secondary);">Code</button>
                    <button onclick="closePreviewPanel()" class="text-lg leading-none px-1 transition hover:opacity-70" style="color: var(--text-muted);">×</button>
                </div>
            </div>
            <div class="flex-grow relative" style="background: var(--bg-surface-alt);">
                <iframe id="preview-iframe" sandbox="allow-scripts" class="w-full h-full border-none" style="background: var(--bg-surface);"></iframe>
                <pre id="preview-code" class="hidden w-full h-full p-4 overflow-auto text-xs font-mono" style="background: #0f172a; color: #e2e8f0;"></pre>
            </div>
        </div>
    </div> <!-- End of Split-View Container -->

    <script>
        {% raw %}
        let ws;
        let WEB_VERBOSE = false;
        let currentHumanAskIsPassword = false;

        // --- Generative UI (Artifacts) State & Functions ---
        let currentArtifactHtml = '';
        let currentPreviewMode = 'preview';

        function renderArtifact(html) {
            currentArtifactHtml = html;
            const panel = document.getElementById('preview-panel');
            const iframe = document.getElementById('preview-iframe');
            const codePre = document.getElementById('preview-code');
            const chatPane = document.getElementById('chat-pane');

            if (panel) panel.classList.remove('hidden');
            if (chatPane) chatPane.classList.remove('max-w-5xl', 'mx-auto');

            if (currentPreviewMode === 'preview') {
                if (iframe) {
                    let finalHtml = html;
                    if (!html.includes('tailwindcss') && !html.includes('cdn.tailwindcss.com')) {
                        if (html.includes('</' + 'head>')) {
                            finalHtml = html.replace('</' + 'head>', '<' + 'script src="https://cdn.tailwindcss.com"></' + 'script></' + 'head>');
                        } else if (html.includes('<' + 'head>')) {
                            finalHtml = html.replace('<' + 'head>', '<' + 'head><' + 'script src="https://cdn.tailwindcss.com"></' + 'script>');
                        } else {
                            finalHtml = '<' + 'script src="https://cdn.tailwindcss.com"></' + 'script>' + html;
                        }
                    }
                    iframe.srcdoc = finalHtml;
                }
            } else {
                if (codePre) codePre.textContent = html;
            }
        }

        function togglePreviewMode(mode) {
            currentPreviewMode = mode;
            const btnPreview = document.getElementById('btn-mode-preview');
            const btnCode = document.getElementById('btn-mode-code');
            const iframe = document.getElementById('preview-iframe');
            const codePre = document.getElementById('preview-code');

            if (mode === 'preview') {
                if (btnPreview) btnPreview.className = 'px-3 py-1.5 text-xs rounded-lg font-bold text-white transition';
                if (btnPreview) btnPreview.style.background = 'var(--accent)';
                if (btnCode) btnCode.className = 'px-3 py-1.5 text-xs rounded-lg transition';
                if (btnCode) { btnCode.style.background = 'var(--border-color)'; btnCode.style.color = 'var(--text-secondary)'; }
                if (iframe) iframe.classList.remove('hidden');
                if (codePre) codePre.classList.add('hidden');
                renderArtifact(currentArtifactHtml);
            } else {
                if (btnPreview) btnPreview.className = 'px-3 py-1.5 text-xs rounded-lg transition';
                if (btnPreview) { btnPreview.style.background = 'var(--border-color)'; btnPreview.style.color = 'var(--text-secondary)'; }
                if (btnCode) btnCode.className = 'px-3 py-1.5 text-xs rounded-lg font-bold text-white transition';
                if (btnCode) btnCode.style.background = 'var(--accent)';
                if (iframe) iframe.classList.add('hidden');
                if (codePre) codePre.classList.remove('hidden');
                if (codePre) codePre.textContent = currentArtifactHtml;
            }
        }

        function closePreviewPanel() {
            const panel = document.getElementById('preview-panel');
            if (panel) panel.classList.add('hidden');
            const chatPane = document.getElementById('chat-pane');
            if (chatPane) chatPane.classList.add('max-w-5xl', 'mx-auto');
        }

        function extractHtmlFromText(text) {
            if (!text) return '';
            const codeBlockRegex = /```(?:html|xml|xhtml)?\s*([\s\S]*?)```/gi;
            let match;
            let lastHtml = '';
            while ((match = codeBlockRegex.exec(text)) !== null) {
                const code = match[1].trim();
                if (code.includes('<' + 'html') || code.includes('<!' + 'DOCTYPE') || code.includes('<' + 'div') || code.includes('<' + 'button') || code.includes('<' + 'script') || code.includes('<' + 'style')) {
                    lastHtml = code;
                }
            }
            if (!lastHtml) {
                const htmlTagRegex = /<html[\s\S]*?<\/html>/gi;
                const tagMatch = htmlTagRegex.exec(text);
                if (tagMatch) lastHtml = tagMatch[0];
            }
            return lastHtml;
        }

        const I18N = {
            ja: {
                title: 'UAGENT WEB',
                appTitle: 'UAGENT WEB',
                humanAskTitle: '確認が必要です',
                humanAskPlaceholder: '回答を入力...',
                humanAskSubmit: '送信',
                footerStatusLabel: '現在の状態:',
                inputPlaceholder: 'メッセージを入力... (Ctrl+Enterで送信)',
                send: '送信',
                statusPrefix: 'Status:',
                toolRunning: 'TOOL RUNNING',
                currentStatusPrefix: 'Current Status:'
            },
            en: {
                title: 'UAGENT WEB',
                appTitle: 'UAGENT WEB',
                humanAskTitle: 'Input required',
                humanAskPlaceholder: 'Type your reply...',
                humanAskSubmit: 'Send',
                footerStatusLabel: 'Current Status:',
                inputPlaceholder: 'Type a message... (Ctrl+Enter to send)',
                send: 'Send',
                statusPrefix: 'Status:',
                toolRunning: 'TOOL RUNNING',
                currentStatusPrefix: 'Current Status:'
            }
        };

        function detectLang() {
            try {
                const url = new URL(window.location.href);
                const q = (url.searchParams.get('lang') || '').toLowerCase();
                if (q === 'ja' || q === 'en' || q === 'ar') return q;
            } catch (e) {}
            try {
                const langs = (navigator.languages && navigator.languages.length) ? navigator.languages : [];
                for (const l of langs) {
                    const s = String(l || '').toLowerCase();
                    if (s.startsWith('ja')) return 'ja';
                    if (s.startsWith('ar')) return 'ar';
                    if (s.startsWith('en')) return 'en';
                }
            } catch (e) {}
            try {
                const nav = String(navigator.language || navigator.userLanguage || 'en').toLowerCase();
                if (nav.startsWith('ja')) return 'ja';
                if (nav.startsWith('ar')) return 'ar';
            } catch (e) {}
            return 'en';
        }

        function applyI18n(lang) {
            const t = I18N[lang] || I18N.en;
            try { document.documentElement.lang = lang; } catch (e) {}
            try { document.title = t.title; } catch (e) {}
            const appTitle = document.getElementById('app-title');
            if (appTitle) appTitle.textContent = t.appTitle;
            const humanAskTitle = document.getElementById('human-ask-title');
            if (humanAskTitle) humanAskTitle.textContent = t.humanAskTitle;
            const humanAskSubmitBtn = document.getElementById('human-ask-submit-btn');
            if (humanAskSubmitBtn) humanAskSubmitBtn.textContent = t.humanAskSubmit;
            const footerStatusLabel = document.getElementById('footer-status-label');
            if (footerStatusLabel) footerStatusLabel.textContent = t.footerStatusLabel;
            if (humanAskInput) humanAskInput.placeholder = t.humanAskPlaceholder;
            if (userInput) userInput.placeholder = t.inputPlaceholder;
            if (sendBtn) sendBtn.textContent = t.send;
        }

        const UI_LANG = detectLang();

        // Streaming assistant bubble state
        let streamAssistant = { id: null, div: null, pre: null, active: false, text: '' };
        let lastAssistantStreamText = '';

        const chatBox = document.getElementById('chat-box');
        const statusTextHeader = document.getElementById('status-text-header');
        const busyIndicator = document.getElementById('busy-indicator');
        const workdirTextHeader = document.getElementById('workdir-text-header');
        const statusTextFooter = document.getElementById('status-text-footer');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const pickFilesBtn = document.getElementById('pick-files-btn');
        const attachmentPreview = document.getElementById('attachment-preview');
        const humanAskContainer = document.getElementById('human-ask-container');
        const humanAskMessage = document.getElementById('human-ask-message');
        const humanAskInput = document.getElementById('human-ask-input');

        const modesText = document.getElementById('modes-text');
        const reasoningSelect = document.getElementById('reasoning-select');
        const verbositySelect = document.getElementById('verbosity-select');
        let CURRENT_MODES = { reasoning: 'off', verbosity: 'off' };
        let currentRoom = '';
        let pendingAttachments = [];
        let inputHistory = [];
        let historyIndex = -1;

        function getRoomIdFromUrl() {
            try {
                const url = new URL(window.location.href);
                const pathRoom = (url.pathname.match(/^\/room\/([^\/]+)/) || [])[1];
                const queryRoom = url.searchParams.get('room');
                return pathRoom || queryRoom || '';
            } catch (e) { return ''; }
        }

        function isImageAttachment(att) {
            const type = String((att && (att.type || att.mime)) || '').toLowerCase();
            const path = String((att && (att.saved_path || att.path || att.file_path || att.name)) || '').toLowerCase();

        async function uploadFiles(fileList) {

        function clearPendingAttachments() { pendingAttachments = []; renderPendingAttachments(); }

        function connect() {

        }

        function renderMessageAttachments(message) {
            const items = []; const seen = new Map();
            const addItem = (candidate) => {
                if (!candidate || typeof candidate !== 'object') return;
                const att = candidate;
                const type = String(att.type || att.mime || 'file').toLowerCase();
                const path = att.saved_path || att.path || att.file_path || '';
                const sourceKey = String(att.data_url || att.url || path || att.name || '').trim();
                if (!sourceKey) return;
                const isImage = isImageAttachment(att);
                const isAudio = isAudioAttachment(att);
                const prevIndex = seen.get(sourceKey);
                if (prevIndex !== undefined) { const prev = items[prevIndex]; if (isImage && prev && !prev.isImage) { items[prevIndex] = { att, type, path, isImage, isAudio }; } return; }
                seen.set(sourceKey, items.length);

            if (!hasAttachmentImage) (message.saved_files || []).forEach((p) => addItem({ type: 'file', saved_path: p }));

                    html += '</div>';

                    html += '<div class="inline-flex flex-col gap-1 px-2 py-2 rounded bg-white border max-w-[280px]">';

        function normalizeMessageForDisplay(msg) {
            const src = (msg && typeof msg === 'object') ? Object.assign({}, msg) : { role: '', content: '' };
            const role = String(src.role || '').toLowerCase();
            const name = String(src.name || '').toLowerCase();

            if (trimmed.startsWith('{') || trimmed.startsWith('[')) { try { parsed = JSON.parse(trimmed); } catch (e) { parsed = null; } }
            if (parsed && typeof parsed === 'object') {

        function addMessage(msg) {

            const normalized = normalizeMessageForDisplay(msg);
            const msgForRender = normalized.msg;
            const body = normalized.body;
            let content = '<strong>' + escapeHtml(String((msgForRender.role || 'message')).toUpperCase()) + ':</strong> ';
            if (msgForRender.name) content += '<span class="text-xs font-mono">[' + escapeHtml(String(msgForRender.name)) + ']</span> ';

                const isAssistant = String(msgForRender.role).toLowerCase() === 'assistant';

            }
            const attachmentsHtml = renderMessageAttachments(msgForRender);
            if (attachmentsHtml) content += attachmentsHtml;
            const isAssistantFinal = String(msgForRender.role || '').toLowerCase() === 'assistant';
            const streamedText = String(lastAssistantStreamText || '').trim();

            try { div.dataset.role = (msgForRender && msgForRender.role) ? String(msgForRender.role) : ''; div.dataset.content = (msgForRender && (msgForRender.content !== undefined)) ? String(msgForRender.content) : ''; div.dataset.ts = String((msgForRender && msgForRender._ts) ? msgForRender._ts : Date.now()); div.dataset.optimistic = (msgForRender && msgForRender._optimistic) ? '1' : '0'; } catch (e) {}

        function escapeHtml(text) {

        }

                        else if (code === '35') styles.push('color: #8b5cf6');
                        else if (code === '36') styles.push('color: #06b6d4');
                        else if (code === '1') styles.push('font-weight: bold');
                        else if (code === '3') styles.push('font-style: italic');
                        else if (code === '4') styles.push('text-decoration: underline');
                    });
                    if (styles.length > 0) { result += '<span style="' + styles.join('; ') + '">'; openSpans++; }
                }
                lastIndex = ansiRegex.lastIndex;
            }
            result += escapeHtml(text.slice(lastIndex));
            while (openSpans > 0) { result += '</span>'; openSpans--; }
            return result;
        }

        function formatMessageBody(body, role) {
            if (!body) return '';
            var isAssistant = String(role).toLowerCase() === 'assistant';
            if (!isAssistant || body.indexOf('```') < 0) { return linkifyHtml(ansiToHtml(body)); }
            var parts = body.split(/(```(?:html|xml|xhtml|css|javascript|js|json|python|py|sh|bash)?[\s\S]*?```)/gi);
            var result = '';
            for (var pi = 0; pi < parts.length; pi++) {
                var part = parts[pi];
                if (part.indexOf('```') === 0 && part.slice(-3) === '```') {
                    var match = part.match(/```(?:html|xml|xhtml|css|javascript|js|json|python|py|sh|bash)?\s*([\s\S]*?)```/i);
                    if (match) {
                        var code = match[1];
                        var langMatch = part.match(/```(\w+)/);
                        var lang = langMatch ? langMatch[1] : 'code';
                        var escapedCode = escapeHtml(code.trim());
                        result += '<details class="my-2 overflow-hidden" style="border:1px solid var(--border-color);border-radius:8px;background:var(--bg-surface-alt);">';
                        result += '<summary class="px-3 py-1.5 text-xs font-bold cursor-pointer select-none flex justify-between items-center" style="background:var(--bg-surface);color:var(--text-secondary);border-bottom:1px solid var(--border-color);border-radius:7px 7px 0 0;">';
                        result += '<span>\ud83d\udcc4 Source Code (' + lang.toUpperCase() + ')</span>';
                        result += '<span class="text-[10px] text-gray-500">\u30af\u30ea\u30c3\u30af\u3067\u5c55\u958b</span>';
                        result += '</summary>';
                        result += '<pre class="p-3 text-xs font-mono overflow-auto max-h-[250px] whitespace-pre" style="background:#0f172a;color:#e2e8f0;">' + escapedCode + '</pre>';
                        result += '</details>';
                    } else { result += linkifyHtml(ansiToHtml(part)); }
                } else { result += linkifyHtml(ansiToHtml(part)); }
            }
            return result;
        }
        function linkifyHtml(escapedHtml) {
            var urlRe = /\b(https?:\/\/[^\s<>\"']+|www\.[^\s<>\"']+)/gi;
            return escapedHtml.replace(urlRe, function(m) {
                var href = m.indexOf('www.') === 0 ? 'https://' + m : m;
                return '<a href="' + href + '" target="_blank" rel="noopener noreferrer" class="text-blue-600 underline break-all">' + m + '</a>';
            });
        }

        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); sendMessage(); return; }
            if (e.key === 'ArrowUp' && e.ctrlKey && inputHistory.length) {
                e.preventDefault();
                if (historyIndex > 0) { historyIndex--; }
                else { historyIndex = inputHistory.length - 1; }
                userInput.value = inputHistory[historyIndex];
                return;
            }
            if (e.key === 'ArrowDown' && e.ctrlKey && inputHistory.length) {
                e.preventDefault();
                if (historyIndex < inputHistory.length - 1) { historyIndex++; }
                else { historyIndex = inputHistory.length; userInput.value = ''; return; }
                userInput.value = inputHistory[historyIndex];
                return;
            }
        });
        sendBtn.onclick = sendMessage;

        // Stop button
        const stopBtn = document.getElementById('stop-btn');
        if (stopBtn) {
            stopBtn.onclick = function() {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'interrupt' }));
                    stopBtn.classList.add('hidden');
                    stopBtn.disabled = true;
                }
            };
        }
        if (pickFilesBtn && fileInput) { pickFilesBtn.onclick = function() { fileInput.click(); }; }
        if (fileInput) {
            fileInput.addEventListener('change', async function() {
                try { await uploadFiles(fileInput.files); } catch (e) { alert('Upload failed: ' + e); } finally { fileInput.value = ''; }
            });
        }
        if (dropZone) {
            var prevent = function(e) { e.preventDefault(); e.stopPropagation(); };
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(function(evt) { dropZone.addEventListener(evt, prevent, false); });
            ['dragenter', 'dragover'].forEach(function(evt) { dropZone.addEventListener(evt, function() { dropZone.classList.add('border-blue-500', 'bg-blue-50'); }, false); });
            ['dragleave', 'drop'].forEach(function(evt) { dropZone.addEventListener(evt, function() { dropZone.classList.remove('border-blue-500', 'bg-blue-50'); }, false); });
            dropZone.addEventListener('drop', async function(e) {
                try { var files = e.dataTransfer && e.dataTransfer.files ? e.dataTransfer.files : []; if (files.length) await uploadFiles(files); }
                catch (err) { alert('Upload failed: ' + err); }
            }, false);
        }
        try { if (reasoningSelect) reasoningSelect.onchange = sendSetModes; if (verbositySelect) verbositySelect.onchange = sendSetModes; } catch (e) {}
        humanAskInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') submitHumanAsk(); });
        applyI18n(UI_LANG);
        connect();

        // Tool genre selection
        (function() {
            var checkboxes = document.querySelectorAll('.genre-toggle');
            var busy = false;

            function updateGenreUI() { checkboxes.forEach(function(cb) { cb.disabled = busy; }); }

            function loadGenreState() {
                fetch('/api/tool-genres').then(function(r) { return r.json(); }).then(function(data) {
                    busy = data.busy || false;
                    data.genres.forEach(function(g) {
                        var cb = document.querySelector('.genre-toggle[data-genre="' + g.key + '"]');
                        if (cb) cb.checked = g.enabled;
                    });
                    updateGenreUI();
                }).catch(function() {});
            }

            function toggleGenre(genre, enabled) {
                fetch('/api/tool-genres', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({genre: genre, enabled: enabled}) }).catch(function() {});
            }

            checkboxes.forEach(function(cb) {
                cb.addEventListener('change', function() { toggleGenre(cb.dataset.genre, cb.checked); });
            });

            setInterval(function() {
                fetch('/api/tool-genres').then(function(r) { return r.json(); }).then(function(data) {
                    var wasBusy = busy;
                    busy = data.busy || false;
                    if (busy !== wasBusy) updateGenreUI();
                }).catch(function() {});
            }, 2000);

            loadGenreState();
        })();

        // --- Dark Mode Toggle ---
        function getPreferredTheme() {
            try { return localStorage.getItem('uag-theme'); } catch (e) { return null; }
        }
        function setPreferredTheme(theme) {
            try { localStorage.setItem('uag-theme', theme); } catch (e) {}
        }
        function applyTheme(theme) {
            var isDark = theme === 'dark';
            document.documentElement.classList.toggle('dark', isDark);
            var btn = document.getElementById('dark-mode-btn');
            if (btn) btn.textContent = isDark ? '\u2600\uFE0F' : '\uD83C\uDF19';
        }
        function toggleDarkMode() {
            var isDark = document.documentElement.classList.contains('dark');
            var newTheme = isDark ? 'light' : 'dark';
            applyTheme(newTheme);
            setPreferredTheme(newTheme);
        }
        // Init theme from localStorage or system preference
        (function() {
            var saved = getPreferredTheme();
            if (saved === 'dark' || saved === 'light') { applyTheme(saved); return; }
            try {
                if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) { applyTheme('dark'); }
            } catch (e) {}
        })();

        // --- Settings Panel Toggle ---
        function toggleSettingsPanel() {
            var panel = document.getElementById('settings-panel');
            var btn = document.getElementById('settings-toggle-btn');
            if (!panel) return;
            var isOpen = panel.classList.contains('open');
            panel.classList.toggle('open');
            if (btn) btn.classList.toggle('active');
        }
        {% endraw %}
    </script>
