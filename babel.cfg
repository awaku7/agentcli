# Translation extraction rules for uagent.
#
# Scope:
# - include runtime/common packages only
# - exclude src/uagent/tools, tests, and project scripts
#
# Adjust this file if new runtime packages are added.

[python: src/uagent/*.py]
encoding = utf-8

[python: src/uagent/a2a/*.py]
encoding = utf-8

[python: src/uagent/docs/*.py]
encoding = utf-8

[python: src/uagent/utils/*.py]
encoding = utf-8

[python: src/uagent/zscaler/*.py]
encoding = utf-8

[python: src/uag_envsec/*.py]
encoding = utf-8
